<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Velha</title>
  <link href="bingo.css" rel="stylesheet" />
</head>

<body>
  <div class="container">
    <div class="controls">
      <div id="display">
        <h1>Jogo da Velha</h1>
      </div>
    </div>
    
    <div class="controls">
      <button class="botaoSorteiaNumero" onclick="ReiniciarJogo()">
        Novo Jogo
      </button>
    </div>
    
    <table class="jogo-da-velha">
      <tr>
        <td id="c0" onclick="MarcarCasa(this)"></td>
        <td id="c1" onclick="MarcarCasa(this)"></td>
        <td id="c2" onclick="MarcarCasa(this)"></td>
      </tr>
      <tr>
        <td id="c3" onclick="MarcarCasa(this)"></td>
        <td id="c4" onclick="MarcarCasa(this)"></td>
        <td id="c5" onclick="MarcarCasa(this)"></td>
      </tr>
      <tr>
        <td id="c6" onclick="MarcarCasa(this)"></td>
        <td id="c7" onclick="MarcarCasa(this)"></td>
        <td id="c8" onclick="MarcarCasa(this)"></td>
      </tr>
    </table>
    
    <div class="controls">
      <button class="botaoGerarCartela" onclick="TestarAPI()">
        Testar API
      </button>
    </div>
  </div>

  <br />
  <script src="javascrip.js"></script>
</body>

</html>
