<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Jogos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 90%;
            padding: 2rem;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 3rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem 1rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.3);
        }
        .icon {
            font-size: 3.5rem;
        }
        .card h2 {
            font-size: 1.3rem;
        }
        .card p {
            font-size: 0.85rem;
            color: #bbb;
        }
        .velha { border-top: 4px solid #f5576c; }
        .forca { border-top: 4px solid #4facfe; }
        .memoria { border-top: 4px solid #43e97b; }
        .jokenpo { border-top: 4px solid #fa709a; }
        footer {
            margin-top: 3rem;
            color: #555;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Arcade Hub</h1>
        <p class="subtitle">Escolha um jogo para jogar</p>
        <div class="grid">
            <a href="jogo-da-velha.html" class="card velha">
                <span class="icon">✕○</span>
                <h2>Jogo da Velha</h2>
                <p>Clássico jogo de tabuleiro para 2 jogadores</p>
            </a>
            <a href="forca.html" class="card forca">
                <span class="icon">🔤</span>
                <h2>Forca</h2>
                <p>Adivinhe a palavra antes de ser enforcado</p>
            </a>
            <a href="memoria.html" class="card memoria">
                <span class="icon">🧠</span>
                <h2>Jogo da Memória</h2>
                <p>Encontre todos os pares de cartas</p>
            </a>
            <a href="jokenpo.html" class="card jokenpo">
                <span class="icon">✊✋✌️</span>
                <h2>Jokenpô</h2>
                <p>Pedra, papel ou tesoura contra o computador</p>
            </a>
        </div>
        <footer>Feito com ❤️</footer>
    </div>
</body>
</html>
