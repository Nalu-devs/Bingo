<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Loja</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <a href="/" class="logo">Minha Loja</a>
      <nav class="nav">
        <a href="/" class="nav-link" data-page="home">Início</a>
        <a href="/produtos" class="nav-link" data-page="products">Produtos</a>
      </nav>
      <div class="header-actions">
        <div id="auth-section">
          <button class="btn btn-outline" id="login-btn" onclick="showLogin()">Entrar</button>
          <button class="btn btn-primary" id="register-btn" onclick="showRegister()">Cadastrar</button>
        </div>
        <div id="user-section" class="hidden">
          <span id="user-name" class="user-name"></span>
          <button class="btn btn-outline" onclick="logout()">Sair</button>
        </div>
        <button class="cart-btn" onclick="showCart()">
          🛒 <span id="cart-count" class="cart-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container main-content" id="main-content">
    <div id="loading" class="loading hidden">Carregando...</div>
    <div id="page-content"></div>
  </main>

  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()"></div>
  <div id="modal" class="modal hidden">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/products.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
