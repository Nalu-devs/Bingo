<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { text-align: center; padding: 2rem; max-width: 700px; width: 100%; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .info {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }
        .info span { color: #aaa; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 500px;
            margin: 0 auto 1.5rem;
        }
        .carta {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #4facfe, #f5576c);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.4s, background 0.3s;
            user-select: none;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .carta.virada {
            background: rgba(255,255,255,0.1);
            transform: rotateY(180deg);
        }
        .carta.par {
            background: rgba(67,233,123,0.3);
            border-color: #43e97b;
            cursor: default;
        }
        .carta.erro {
            background: rgba(245,87,108,0.4);
            border-color: #f5576c;
        }

        .btn {
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg, #f5576c, #4facfe);
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }

        .btn-voltar {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            text-decoration: none;
            display: inline-block;
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            margin-top: 1rem;
            transition: background 0.2s;
            font-size: 0.95rem;
        }
        .btn-voltar:hover { background: rgba(255,255,255,0.2); }

        .mensagem {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0.5rem 0;
            min-height: 2rem;
            color: #43e97b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Jogo da Memória</h1>
        <div class="info">
            <div>Tentativas: <strong id="tentativas">0</strong></div>
            <div>Pares: <strong id="pares">0</strong>/8</div>
        </div>
        <div class="mensagem" id="mensagem"></div>
        <div class="grid" id="grid"></div>
        <button class="btn" onclick="novoJogo()">Novo Jogo</button>
        <br>
        <a href="index.html" class="btn-voltar">← Voltar ao menu</a>
    </div>
    <script>
        const emojis = ['🍎','🍊','🍋','🍇','🍓','🍒','🍑','🍍'];

        let cartas, primeira, segunda, bloqueado, paresEncontrados, tentativas;

        function embaralhar(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function novoJogo() {
            const duplas = [...emojis, ...emojis];
            cartas = embaralhar(duplas);
            primeira = null;
            segunda = null;
            bloqueado = false;
            paresEncontrados = 0;
            tentativas = 0;
            document.getElementById('tentativas').textContent = '0';
            document.getElementById('pares').textContent = '0/8';
            document.getElementById('mensagem').textContent = '';
            renderizar();
        }

        function renderizar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cartas.forEach((emoji, i) => {
                const div = document.createElement('div');
                div.className = 'carta';
                div.dataset.index = i;
                div.onclick = () => virar(i);
                grid.appendChild(div);
            });
        }

        function virar(i) {
            if (bloqueado) return;
            const carta = document.querySelectorAll('.carta')[i];
            if (carta.classList.contains('virada') || carta.classList.contains('par')) return;

            carta.textContent = cartas[i];
            carta.classList.add('virada');

            if (!primeira) {
                primeira = { index: i, el: carta };
                return;
            }

            segunda = { index: i, el: carta };
            bloqueado = true;
            tentativas++;
            document.getElementById('tentativas').textContent = tentativas;

            if (cartas[primeira.index] === cartas[segunda.index]) {
                primeira.el.classList.remove('virada');
                primeira.el.classList.add('par');
                segunda.el.classList.remove('virada');
                segunda.el.classList.add('par');
                paresEncontrados++;
                document.getElementById('pares').textContent = `${paresEncontrados}/8`;
                primeira = null;
                segunda = null;
                bloqueado = false;
                if (paresEncontrados === 8) {
                    document.getElementById('mensagem').textContent = `Parabéns! Você completou em ${tentativas} tentativas! 🎉`;
                }
            } else {
                setTimeout(() => {
                    primeira.el.textContent = '';
                    primeira.el.classList.remove('virada');
                    segunda.el.textContent = '';
                    segunda.el.classList.remove('virada');
                    primeira = null;
                    segunda = null;
                    bloqueado = false;
                }, 800);
            }
        }

        novoJogo();
    </script>
</body>
</html>
